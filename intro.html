<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Exam Hall Management | Ramco</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 10% 20%, #001f2b, #000a0f);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Poppins', 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* Animated background particles */
        .particle {
            position: absolute;
            background: rgba(255, 200, 100, 0.2);
            border-radius: 50%;
            pointer-events: none;
            animation: floatUp 8s infinite ease-in-out;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            50% { opacity: 0.8; }
            100% { transform: translateY(-20vh) scale(1.2); opacity: 0; }
        }

        /* Glass card */
        .glass-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(14px);
            border-radius: 3rem;
            padding: 3rem 2.5rem;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 255, 255, 0.15);
            width: 90%;
            max-width: 550px;
            z-index: 10;
            animation: fadeInUp 1s ease-out;
            transition: transform 0.3s;
        }

        .glass-card:hover {
            transform: scale(1.02);
            background: rgba(255, 255, 255, 0.12);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            font-size: 4.5rem;
            margin-bottom: 0.5rem;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #FFE6B0, #FFB347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
            margin-bottom: 0.5rem;
        }

        .sub {
            color: #cce7f0;
            font-weight: 500;
            margin-bottom: 2rem;
            font-size: 1rem;
        }

        .start-btn {
            background: linear-gradient(95deg, #FF9A3C, #FF6A1A);
            border: none;
            padding: 1rem 2.8rem;
            font-size: 1.5rem;
            font-weight: bold;
            color: #1e2b32;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.25s;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            display: inline-flex;
            align-items: center;
            gap: 12px;
            margin-top: 1rem;
        }

        .start-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
            background: linear-gradient(95deg, #FFB347, #FF8C1A);
        }

        .start-btn:active {
            transform: translateY(2px);
        }

        .footer-note {
            margin-top: 2rem;
            font-size: 0.7rem;
            color: #88bbdd;
        }

        /* ripple effect */
        .ripple {
            position: relative;
            overflow: hidden;
        }
        .ripple:after {
            content: "";
            display: block;
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            background-image: radial-gradient(circle, #fff 10%, transparent 10.01%);
            background-repeat: no-repeat;
            background-position: 50%;
            transform: scale(10,10);
            opacity: 0;
            transition: transform .5s, opacity 1s;
        }
        .ripple:active:after {
            transform: scale(0,0);
            opacity: 0.3;
            transition: 0s;
        }
    </style>
</head>
<body>
    <!-- dynamic particles will be added via JS -->
    <div class="glass-card">
        <div class="logo">🏛️📋</div>
        <h1>Exam Hall Management</h1>
        <div class="sub">Ramco Institute of Technology | IAT - II (April 2026)</div>
        <button class="start-btn ripple" id="startButton">🚀 Start &nbsp;→</button>
        <div class="footer-note">Secure • Fast • Hall Allocation for 1000+ students</div>
    </div>

    <script>
        // Create floating particles
        function createParticles() {
            const particleCount = 40;
            for (let i = 0; i < particleCount; i++) {
                let particle = document.createElement('div');
                particle.classList.add('particle');
                let size = Math.random() * 10 + 4;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 10 + 's';
                particle.style.animationDuration = Math.random() * 6 + 4 + 's';
                particle.style.background = `rgba(255, 180, 80, ${Math.random() * 0.4 + 0.2})`;
                document.body.appendChild(particle);
            }
        }
        createParticles();

        // Redirect to main search page (index.html or search.html)
        // You can change the target page as needed. 
        // By default it will go to "index.html" (the attractive search page we created earlier).
        document.getElementById('startButton').addEventListener('click', () => {
            // Add a nice click effect
            const btn = document.getElementById('startButton');
            btn.style.transform = 'scale(0.96)';
            setTimeout(() => {
                window.location.href = 'index.html';  // Change to your main hall management page
            }, 150);
        });
    </script>
</body>
</html>
