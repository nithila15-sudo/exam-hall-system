<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Hall Start</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            background: #f0f4f8;
            font-family: Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .box {
            background: white;
            padding: 2.5rem 2rem;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 400px;
        }
        h1 {
            color: #1e3a5f;
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }
        p {
            color: #4a627a;
            margin-bottom: 1.8rem;
        }
        button {
            background: #2c7da0;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1.2rem;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background: #1f5e7a;
        }
        .small {
            margin-top: 1.2rem;
            font-size: 0.7rem;
            color: gray;
        }
    </style>
</head>
<body>
<div class="box">
    <h1>📋 Exam Hall</h1>
    <p>Ramco Institute • IAT-II 2026</p>
    <button id="startBtn">Start →</button>
    <div class="small">Click Start to find your hall</div>
</div>

<script>
    // IMPORTANT: Change this to your actual main hall page filename
    // If your main page is "search.html", write "search.html"
    // If it's "index.html", write "index.html"
    const mainPage = "index.html";

    document.getElementById("startBtn").addEventListener("click", function() {
        window.location.href = mainPage;
    });
</script>
</body>
</html>
