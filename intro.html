<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Hall | Ramco</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(120deg, #e0f7fa, #b2ebf2);
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .card {
            background: white;
            border-radius: 1.5rem;
            padding: 2.5rem 2rem;
            text-align: center;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            transition: 0.2s;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.15);
        }

        .icon {
            font-size: 3.5rem;
            margin-bottom: 0.8rem;
        }

        h1 {
            font-size: 1.8rem;
            color: #00695c;
            margin-bottom: 0.4rem;
            font-weight: 600;
        }

        .sub {
            color: #00796b;
            font-size: 0.9rem;
            margin-bottom: 1.8rem;
            font-weight: 500;
        }

        .btn {
            background: #00897b;
            color: white;
            border: none;
            padding: 0.8rem 2rem;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            margin: 0.5rem 0;
        }

        .btn:hover {
            background: #00695c;
            transform: scale(1.02);
        }

        .btn:active {
            transform: scale(0.98);
        }

        .footer-note {
            font-size: 0.7rem;
            color: #78909c;
            margin-top: 1.2rem;
        }

        small {
            display: block;
            margin-top: 0.5rem;
            color: #4db6ac;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="icon">📘🏫</div>
    <h1>Exam Hall Management</h1>
    <div class="sub">Ramco Institute of Technology<br>IAT - II (April 2026)</div>
    <button class="btn" id="startBtn">Start →</button>
    <div class="footer-note">📍 1000+ students • Fast hall search</div>
    <small>Tap to continue</small>
</div>

<script>
    const startBtn = document.getElementById('startBtn');
    function goToMain() {
        window.location.href = "index.html";  // change to your main search page if needed
    }
    startBtn.addEventListener('click', goToMain);
    // optional: also allow clicking anywhere on card (uncomment if you want)
    // document.querySelector('.card').addEventListener('click', goToMain);
</script>
</body>
</html>
