<!DOCTYPE html>
<html>
<head>
<title>Schedule</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2>Exam Schedule</h2>

<input id="subject" placeholder="Subject">
<input id="hall" placeholder="Hall">
<input id="time" placeholder="Time">

<button onclick="add()">Add</button>

<table>
<tr>
<th>Subject</th>
<th>Hall</th>
<th>Time</th>
</tr>
<tbody id="out"></tbody>
</table>

<script>
let data = JSON.parse(localStorage.getItem("data")) || [];

function add(){
let s=subject.value;
let h=hall.value;
let t=time.value;

for(let e of data){
if(e.h==h && e.t==t){
alert("Conflict ❌");
return;
}
}

data.push({s,h,t});
localStorage.setItem("data", JSON.stringify(data));
show();
}

function show(){
out.innerHTML="";
data.forEach(e=>{
out.innerHTML+=`<tr>
<td>${e.s}</td>
<td>${e.h}</td>
<td>${e.t}</td>
</tr>`;
});
}

show();
</script>

</body>
</html>
