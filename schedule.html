<script>
    var reg = localStorage.getItem("regno");

    if(!reg) {
        document.getElementById("data").innerHTML =
            "<td colspan='3'>No Register Number Found</td>";
    } else {

        var lastDigit = reg.toString().slice(-1);

        var subject = "";
        var hall = "";
        var time = "";

        if(lastDigit === "1" || lastDigit === "2" || lastDigit === "3") {
            subject = "Maths";
            hall = "A101";
            time = "10:00 AM";
        }
        else if(lastDigit === "4" || lastDigit === "5" || lastDigit === "6") {
            subject = "Physics";
            hall = "B202";
            time = "1:00 PM";
        }
        else {
            subject = "Chemistry";
            hall = "C303";
            time = "3:00 PM";
        }

        document.getElementById("data").innerHTML =
            "<td>" + subject + "</td>" +
            "<td>" + hall + "</td>" +
            "<td>" + time + "</td>";
    }
</script>
