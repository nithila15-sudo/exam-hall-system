<!DOCTYPE html>
<html>
<head>
    <title>Schedule</title>
</head>
<body>

<h2>Exam Details</h2>

<table border="1">
<tr>
<th>Subject</th>
<th>Hall</th>
<th>Time</th>
</tr>

<tr id="data"></tr>

</table>

<script>
var reg = localStorage.getItem("regno");

if(!reg){
    document.getElementById("data").innerHTML =
    "<td colspan='3'>No Data</td>";
}
else{
    var lastDigit = reg.toString().slice(-1);

    var subject="", hall="", time="";

    if(lastDigit=="1"||lastDigit=="2"||lastDigit=="3"){
        subject="OOPS"; hall="A101"; time="10:00 AM";
    }
    else if(lastDigit=="4"||lastDigit=="5"||lastDigit=="6"){
        subject="MATHS"; hall="B202"; time="1:00 PM";
    }
    else{
        subject="PHYSICS"; hall="C303"; time="3:00 PM";
    }

    document.getElementById("data").innerHTML =
    "<td>"+subject+"</td><td>"+hall+"</td><td>"+time+"</td>";
}
</script>

</body>
</html>
