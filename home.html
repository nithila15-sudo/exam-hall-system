<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Hall Search | Ramco</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#eef2f7;font-family:'Segoe UI',sans-serif;padding:20px}
        .card{max-width:650px;margin:auto;background:white;border-radius:28px;padding:2rem;box-shadow:0 10px 25px rgba(0,0,0,0.1)}
        h2{color:#0b2b40;margin-bottom:0.3rem}
        .sub{color:#4a627a;margin-bottom:1.5rem}
        .input-group{display:flex;gap:12px;margin:1.5rem 0;flex-wrap:wrap}
        input{flex:3;padding:14px;border:2px solid #ccc;border-radius:60px;font-size:1rem}
        button{flex:1;background:#0b2b40;color:white;border:none;border-radius:60px;font-weight:bold;cursor:pointer}
        .result{background:#f0f5fa;border-radius:20px;padding:1rem;margin-top:1rem}
        .badge{background:#ff9142;display:inline-block;padding:5px 12px;border-radius:30px;font-weight:bold}
        .notfound{background:#ffe0e0;padding:1rem;border-radius:20px;color:#b33}
        small{display:block;text-align:center;margin-top:1.2rem;color:#4a627a}
        .nav-link{text-align:center;margin-top:1rem;}
        .nav-link a{color:#2c7da0;text-decoration:none;}
    </style>
</head>
<body>
<div class="card">
    <h2>🔍 Exam Hall Finder</h2>
    <div class="sub">Internal Assessment Test – II | 17 April 2026 (AN)</div>
    <div class="input-group">
        <input type="text" id="rollInput" placeholder="Enter 12-digit Roll Number (eg: 953625104005)">
        <button id="searchBtn">Search</button>
    </div>
    <div id="resultArea" class="result">📌 Your hall & branch will appear here</div>
    <div class="nav-link"><a href="index.html">← Back to Home</a></div>
    <small>✅ Official data – 1000+ students supported</small>
</div>

<script>
function expandRange(str) {
    let numbers = [];
    let parts = str.split(/[\s,]+/);
    for (let part of parts) {
        if (part.includes('-')) {
            let [start, end] = part.split('-');
            if (/^\d{12}$/.test(start) && /^\d{1,3}$/.test(end)) {
                let prefix = start.slice(0,9);
                let sNum = parseInt(start.slice(9),10);
                let eNum = parseInt(end,10);
                for (let i = sNum; i <= eNum; i++) numbers.push(prefix + i.toString().padStart(3,'0'));
            }
        } else if (/^\d{12}$/.test(part)) {
            numbers.push(part);
        }
    }
    return numbers;
}

const hallData = [
    { hall: "A1L03", branch: "CSE - B", rolls: expandRange("953625104005,07-09,11,13,15,19,21,22,26,30,32,34,35,40") },
    { hall: "A1L03", branch: "CSBS", rolls: expandRange("953625244001-05,07-09,11-18") },
    { hall: "A1L04", branch: "CSE - C", rolls: expandRange("953625104004,06,12,16,18,23,24,27,29,39,45,46,51,53-55") },
    { hall: "A1L04", branch: "ECE - A", rolls: expandRange("953625106001-16") },
    { hall: "A2L01", branch: "CSE - B", rolls: expandRange("953625106064-67,69-80") },
    { hall: "A2L01", branch: "AM", rolls: expandRange("953625148001-16") },
    { hall: "A2L02", branch: "IT", rolls: expandRange("953625205001-16") },
    { hall: "A2L02", branch: "AD - A", rolls: expandRange("953625243001,03,05,07,08,10,12-15,18,19,23,28,31,34") },
    { hall: "A2L03", branch: "CSE - C", rolls: expandRange("953625105038,61,63,68,69,71,72,74,75,80-82,93,94,96") },
    { hall: "A2L03", branch: "CSBS", rolls: expandRange("953625244019-33") },
    { hall: "A2L04", branch: "CSE - B", rolls: expandRange("953625104042,43,48,52,57,60,62,70,73,77,78,85,87,90,92,101") },
    { hall: "A2L04", branch: "AD - B", rolls: expandRange("953625243002,04,06,09,11,16,17,20,21,22,24-27,29,30") },
    { hall: "A2R02", branch: "Civil", rolls: expandRange("953625103001-15") },
    { hall: "A2R02", branch: "CSE - B", rolls: expandRange("953625104138,139,145,151,158,160,164,165,166,172,176,179,182,183,185-187") },
    { hall: "A3L01", branch: "EEE", rolls: expandRange("953625105001-63") },
    { hall: "C2R04", branch: "CSE - A", rolls: expandRange("953625104091,095,097-100,105,108,109,114,116,117,120,123,134,140") },
    { hall: "C2R04", branch: "MECH", rolls: expandRange("953625114015-30") },
    { hall: "B3R05", branch: "CSE - A", rolls: expandRange("953625104001-03,10,14,17,20,25,28,31,33,36-38") },
    { hall: "B3R05", branch: "CSBE - B", rolls: expandRange("953625104104,106,107,112,113,115,118,121,127,128,130,133,135,136") }
];

const rollMap = new Map();
hallData.forEach(item => {
    item.rolls.forEach(roll => rollMap.set(roll, { hall: item.hall, branch: item.branch }));
});

document.getElementById('searchBtn').onclick = () => {
    let roll = document.getElementById('rollInput').value.trim();
    let res = document.getElementById('resultArea');
    if (!roll) { res.innerHTML = '<div class="notfound">⚠️ Enter roll number</div>'; return; }
    let data = rollMap.get(roll);
    if (data) {
        res.innerHTML = `<div><span class="badge">🏛️ Hall: ${data.hall}</span></div>
                         <div><strong>Roll:</strong> ${roll}</div>
                         <div><strong>Branch:</strong> ${data.branch}</div>
                         <div><strong>Test:</strong> IAT-II, 17.04.2026 (AN)</div>`;
    } else {
        res.innerHTML = `<div class="notfound">❌ Roll ${roll} not found.<br>⚠️ All roll numbers start with <strong>953625</strong><br>Example: 953625104108</div>`;
    }
};
document.getElementById('rollInput').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') document.getElementById('searchBtn').click();
});
</script>
</body>
</html>
