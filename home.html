// Search function
document.getElementById('searchBtn').onclick = () => {
    let roll = document.getElementById('rollInput').value.trim();
    if (!roll) {
        alert("Please enter roll number");
        return;
    }
    let data = hallData[roll];
    if (data) {
        // Store in localStorage (more reliable than sessionStorage)
        localStorage.setItem('rollNumber', roll);
        localStorage.setItem('hall', data.hall);
        localStorage.setItem('branch', data.branch);
        window.location.href = 'result.html';
    } else {
        alert("❌ Roll number " + roll + " not found!\n\nPlease check your roll number.\nExample: 953625104108");
    }
};

document.getElementById('rollInput').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') document.getElementById('searchBtn').click();
});
