<!DOCTYPE html>
<html>
<head>
<title>Student Details</title>
</head>
<body>

<h2>Exam Details</h2>

<p id="name"></p>
<p id="subject"></p>
<p id="hall"></p>
<p id="time"></p>

<button onclick="logout()">Logout</button>

<script>
var data = JSON.parse(localStorage.getItem("student"));

document.getElementById("name").innerHTML = "Name: " + data.name;
document.getElementById("subject").innerHTML = "Subject: " + data.subject;
document.getElementById("hall").innerHTML = "Hall: " + data.hall;
document.getElementById("time").innerHTML = "Time: " + data.time;

function logout(){
    localStorage.clear();
    window.location = "index.html";
}
</script>

</body>
</html>
