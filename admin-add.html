<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Student | Admin</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#eef2f7;font-family:'Segoe UI',sans-serif;padding:20px}
.card{max-width:500px;margin:auto;background:white;border-radius:28px;padding:2rem;box-shadow:0 10px 25px rgba(0,0,0,0.1)}
h2{color:#0b2b40;margin-bottom:1rem}
input{width:100%;padding:12px;margin:10px 0;border:1px solid #ccc;border-radius:40px}
button{width:100%;padding:12px;background:#0b2b40;color:white;border:none;border-radius:40px;cursor:pointer;font-weight:bold}
.btn-back{background:#4a627a;margin-top:10px}
.msg{margin-top:10px;text-align:center}
</style>
</head>
<body>
<div class="card">
<h2>➕ Add New Student</h2>
<input type="text" id="rollNumber" placeholder="Roll Number (12 digits)">
<input type="text" id="hall" placeholder="Hall Number">
<input type="text" id="branch" placeholder="Branch">
<input type="text" id="name" placeholder="Name (optional)">
<button onclick="addStudent()">➕ Add Student</button>
<button class="btn-back" onclick="location.href='admin-dashboard.html'">← Back to Dashboard</button>
<div id="msg" class="msg"></div>
</div>
<script>
function addStudent(){
    let roll=document.getElementById('rollNumber').value.trim();
    let hall=document.getElementById('hall').value.trim();
    let branch=document.getElementById('branch').value.trim();
    let name=document.getElementById('name').value.trim();
    if(!roll||!hall||!branch){ document.getElementById('msg').innerHTML='<span style="color:red">❌ Roll, Hall, Branch required!</span>'; return; }
    if(roll.length!==12 || isNaN(roll)){ document.getElementById('msg').innerHTML='<span style="color:red">❌ Roll must be 12 digits!</span>'; return; }
    let data=JSON.parse(localStorage.getItem('studentData'))||[];
    if(data.find(s=>s.roll===roll)){ document.getElementById('msg').innerHTML='<span style="color:red">❌ Roll already exists!</span>'; return; }
    data.push({roll,hall,branch,name});
    localStorage.setItem('studentData',JSON.stringify(data));
    document.getElementById('msg').innerHTML='<span style="color:green">✅ Student added!</span>';
    setTimeout(()=>{ window.location.href='admin-dashboard.html'; },1000);
}
</script>
</body>
</html>
