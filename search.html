// Also ensure no duplicate issues.

function expandRolls(str) {
  let parts = str.split(/[ ,]+/);
  let result = new Set();
  let currentPrefix = null;
  for (let p of parts) {
    if (p.includes('-')) {
      let [start, end] = p.split('-');
      if (/^\d{12}$/.test(start) && /^\d{12}$/.test(end)) {
        let s = BigInt(start), e = BigInt(end);
        for (let i = s; i <= e; i++) result.add(i.toString().padStart(12,'0'));
        currentPrefix = start.slice(0,9);
      } else if (/^\d{12}$/.test(start) && /^\d{1,3}$/.test(end)) {
        let prefix = start.slice(0,9);
        let sNum = parseInt(start.slice(9),10);
        let eNum = parseInt(end,10);
        for (let i = sNum; i <= eNum; i++) result.add(prefix + i.toString().padStart(3,'0'));
        currentPrefix = prefix;
      } else if (currentPrefix && /^\d{1,3}$/.test(start) && /^\d{1,3}$/.test(end)) {
        let s = parseInt(start,10), e = parseInt(end,10);
        for (let i = s; i <= e; i++) result.add(currentPrefix + i.toString().padStart(3,'0'));
      }
    } else if (/^\d{12}$/.test(p)) {
      result.add(p);
      currentPrefix = p.slice(0,9);
    } else if (currentPrefix && /^\d{1,3}$/.test(p)) {
      result.add(currentPrefix + p.padStart(3,'0'));
    } else if (/^\d+$/.test(p)) {
      result.add(p);
    }
  }
  return Array.from(result);
}
