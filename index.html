<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Hall System | Ramco</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            background: linear-gradient(135deg, #0b2b40, #1a4a6f);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            padding: 1.5rem;
        }
        .card{
            background: white;
            border-radius: 2rem;
            padding: 2.5rem;
            text-align: center;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        h1{color: #0b2b40; margin-bottom: 0.5rem;}
        .tagline{color: #2c7da0; margin-bottom: 1rem;}
        .btn{
            background: #0b2b40;
            color: white;
            border: none;
            padding: 12px 28px;
            font-size: 1.2rem;
            border-radius: 40px;
            cursor: pointer;
            margin-top: 1rem;
            font-weight: bold;
        }
        .btn:hover{background: #1f5e7a;}
        .features{
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: #4a627a;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>🏛️ Exam Hall Management</h1>
    <div class="tagline">Ramco Institute of Technology</div>
    <p>Internal Assessment Test – II<br>I Year | 17 April 2026</p>
    <button class="btn" onclick="location.href='home.html'">Enter →</button>
    <div class="features">
        ✅ 1000+ students supported<br>
        🔍 Find your hall instantly
    </div>
</div>
</body>
</html>
