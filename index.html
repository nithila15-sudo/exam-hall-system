<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Hall System | CSE Dept</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            background: linear-gradient(135deg, #0b2b40, #1a4a6f);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            padding: 1.5rem;
        }
        .card{
            background: white;
            border-radius: 2rem;
            padding: 2rem;
            text-align: center;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        h1{color: #0b2b40; margin-bottom: 0.5rem;}
        .tagline{color: #2c7da0; margin-bottom: 1.5rem;}
        .btn-group{
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .btn{
            background: #0b2b40;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 1.1rem;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
            display: block;
        }
        .btn-admin{
            background: #e67e22;
        }
        .btn:hover{ background: #1f5e7a; }
        .btn-admin:hover{ background: #d35400; }
        .features{
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: #4a627a;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>🏛️ CSE Exam Hall System</h1>
    <div class="tagline">Ramco Institute of Technology</div>
    <p>Internal Assessment Test – II<br>I, II, III Year CSE | 17 April 2026</p>
    <div class="btn-group">
        <a href="home.html" class="btn">🔍 Student Search →</a>
        <a href="admin-login.html" class="btn btn-admin">👑 Admin / Exam Cell →</a>
    </div>
    <div class="features">
        ✅ 500+ students loaded<br>
        📊 Excel import/export • Edit hall data
    </div>
</div>
</body>
</html>
