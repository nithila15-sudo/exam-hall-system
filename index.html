<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">
<title>Student Login</title>
</head>

<h2>Exam Hall Login</h2>

<input id="user" placeholder="Enter Register Number"><br><br>
<input id="pass" type="password" placeholder="Password"><br><br>

<button onclick="login()">Login</button>

<script>
var students = {
    "101": {name:"NITHILA", hall:"A1", time:"10AM", subject:"Maths"},
    "102": {name:"SWETHA", hall:"B2", time:"1PM", subject:"Physics"},
    "103": {name:"ANU", hall:"C3", time:"2PM", subject:"Chemistry"}
};

function login(){
    var reg = document.getElementById("user").value;

    if(students[reg]){
        localStorage.setItem("student", JSON.stringify(students[reg]));
        window.location = "home.html";
    } else {
        alert("Invalid Register Number ❌");
    }
}
</script>

</body>
</html>
